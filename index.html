<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TaskFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-root">
      <!-- TOP NAV -->
      <header class="top-nav">
        <div class="top-nav__left">
          <div class="logo-mark">TF</div>
          <span class="logo-text">TaskFlow</span>
        </div>
        <div class="top-nav__right">
          <button class="icon-btn" aria-label="Notifications">
            <span class="icon-btn__dot"></span>
            <svg
              viewBox="0 0 24 24"
              aria-hidden="true"
              class="icon"
            >
              <path
                d="M12 3a6 6 0 0 0-6 6v2.586l-.707 2.12A1 1 0 0 0 6.26 15H17.74a1 1 0 0 0 .967-1.294L18 11.586V9a6 6 0 0 0-6-6Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <path
                d="M10 18a2 2 0 0 0 4 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button class="avatar-btn" aria-label="User profile">
            <div class="avatar">
              <span>I</span>
            </div>
          </button>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main class="main">
        <!-- HOME / TASKS PAGE -->
        <section class="page page--active" data-page="home">
          <!-- removed inline home page content to pages/home.html -->
        </section>

        <section class="page" data-page="tasks">
          <!-- removed inline tasks page content to pages/tasks.html -->

        </section>

        <!-- WALLET PAGE -->
        <section class="page" data-page="wallet">
          <!-- removed inline wallet page content to pages/wallet.html -->
        </section>

        <!-- PROFILE PAGE -->
        <section class="page" data-page="profile">
          <!-- removed inline profile page content to pages/profile.html -->
        </section>
      </main>

      <!-- BOTTOM NAV -->
      <nav class="bottom-nav" aria-label="Primary">
        <div class="bottom-nav__inner">
          <button
            class="bottom-nav__item bottom-nav__item--active"
            data-target="home"
            type="button"
          >
            <span class="bottom-nav__icon">🏠</span>
            <span class="bottom-nav__label">Home</span>
          </button>
          <button
            class="bottom-nav__item"
            data-target="tasks"
            type="button"
          >
            <span class="bottom-nav__icon">📋</span>
            <span class="bottom-nav__label">Tasks</span>
          </button>
          <button
            class="bottom-nav__item"
            data-target="wallet"
            type="button"
          >
            <span class="bottom-nav__icon">💼</span>
            <span class="bottom-nav__label">Wallet</span>
          </button>
          <button
            class="bottom-nav__item"
            data-target="profile"
            type="button"
          >
            <span class="bottom-nav__icon">👤</span>
            <span class="bottom-nav__label">Profile</span>
          </button>
        </div>
      </nav>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
