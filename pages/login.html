<div class="auth-content">
  <section class="auth-hero">
    <div>
      <h1 class="auth-heading">Welcome back.</h1>
      <p class="auth-body">
        Sign in to continue completing tasks and tracking your earnings.
      </p>
    </div>
  </section>

  <section>
    <form id="login-form" class="auth-form" novalidate>
      <div class="auth-form__group">
        <div class="field">
          <input
            id="login-email"
            class="field__input"
            type="email"
            name="email"
            autocomplete="email"
            placeholder=" "
            required
          />
          <label class="field__label" for="login-email">Email</label>
        </div>

        <div class="field">
          <input
            id="login-password"
            class="field__input"
            type="password"
            name="password"
            autocomplete="current-password"
            placeholder=" "
            required
          />
          <label class="field__label" for="login-password">Password</label>
          <button
            type="button"
            class="field__addon"
            id="login-password-toggle"
            aria-label="Show or hide password"
          >
            👁
          </button>
        </div>
      </div>

      <div class="auth-form__row">
        <label class="checkbox-row">
          <input type="checkbox" name="remember" />
          <span>Remember me</span>
        </label>
        <button
          type="button"
          class="auth-link"
          data-auth-target="forgot-password"
        >
          Forgot password?
        </button>
      </div>

      <button type="submit" class="btn btn--primary btn--full">
        <span>Login</span>
      </button>

      <div class="auth-divider">or continue with</div>

      <div class="social-row">
        <button type="button" class="social-btn">
          <span class="social-icon social-icon--google">G</span>
          <span>Continue with Google</span>
        </button>
        <button type="button" class="social-btn">
          <span class="social-icon social-icon--apple"></span>
          <span>Continue with Apple</span>
        </button>
      </div>

      <p class="auth-cta-inline">
        New to TaskFlow?
        <button
          type="button"
          class="auth-link"
          data-auth-target="register"
        >
          Create an account
        </button>
      </p>
    </form>
  </section>
</div>
