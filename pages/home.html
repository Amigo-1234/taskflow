<!-- Hero -->
<section class="hero">
  <div class="hero__text">
    <p class="hero__greeting">Hello Idris 👋</p>
    <h1 class="hero__title">
      Complete simple tasks and track your earnings.
    </h1>
  </div>
  <div class="hero__visual">
    <div class="hero-blob hero-blob--primary"></div>
    <div class="hero-blob hero-blob--secondary"></div>
    <div class="hero-blob hero-blob--accent"></div>
    <div class="hero-card hero-card--tasks">
      <div class="hero-card__pill">Active tasks</div>
      <div class="hero-card__value">7</div>
    </div>
    <div class="hero-card hero-card--earnings">
      <div class="hero-card__pill hero-card__pill--secondary">
        Today
      </div>
      <div class="hero-card__value hero-card__value--small">₦2,450</div>
    </div>
  </div>
</section>

<!-- Balance Card -->
<section class="balance-section">
  <article class="balance-card">
    <div class="balance-card__header">
      <span class="balance-card__label">Available Balance</span>
      <button class="pill pill--muted" type="button">
        <span class="pill__dot"></span>
        Verified
      </button>
    </div>
    <div class="balance-card__amount">
      ₦38,540
    </div>
    <div class="balance-card__meta">
      <div class="balance-card__meta-item">
        <span class="meta-label">Today’s Earnings</span>
        <span class="meta-value meta-value--positive">+₦2,450</span>
      </div>
      <div class="balance-card__meta-item">
        <span class="meta-label">Total Earnings</span>
        <span class="meta-value">₦124,900</span>
      </div>
    </div>
    <div class="balance-card__actions">
      <button class="btn btn--primary" type="button">
        Withdraw
      </button>
      <button class="btn btn--ghost" type="button">
        View wallet
      </button>
    </div>
  </article>
</section>
