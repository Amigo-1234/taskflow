<section class="page-header">
  <h1 class="page-title">Profile</h1>
  <p class="page-subtitle">
    Manage your account, referrals, and preferences.
  </p>
</section>

<section class="profile-section">
  <!-- User Card -->
  <article class="profile-card profile-card--user">
    <div class="profile-card__top">
      <div class="avatar avatar--lg">
        <span>I</span>
      </div>
      <div>
        <p class="profile-name">Idris Adedayo</p>
        <p class="profile-handle">@idris</p>
      </div>
      <span class="badge-soft badge-soft--primary">Pro</span>
    </div>
    <div class="profile-stats">
      <div class="profile-stat">
        <p class="profile-stat__label">Tasks completed</p>
        <p class="profile-stat__value">184</p>
      </div>
      <div class="profile-stat">
        <p class="profile-stat__label">Lifetime earnings</p>
        <p class="profile-stat__value">₦124,900</p>
      </div>
    </div>
  </article>

  <!-- Referral Card -->
  <article class="profile-card profile-card--referral">
    <div class="profile-card__header">
      <div>
        <p class="profile-card__title">Referral Code</p>
        <p class="profile-card__subtitle">
          Share TaskFlow with friends and earn together.
        </p>
      </div>
    </div>
    <div class="referral-code-row">
      <div class="referral-code">
        <span>FLOW-IDRIS-92</span>
      </div>
      <button class="btn btn--secondary btn--small" type="button">
        Copy
      </button>
    </div>
    <button class="btn btn--ghost btn--full" type="button">
      Invite friends
    </button>
  </article>

  <!-- Settings -->
  <article class="profile-card profile-card--settings">
    <div class="settings-list">
      <button class="settings-item" type="button">
        <div>
          <p class="settings-title">Account</p>
          <p class="settings-subtitle">Personal information & security</p>
        </div>
        <span class="settings-chevron">›</span>
      </button>
      <button class="settings-item" type="button">
        <div>
          <p class="settings-title">Notifications</p>
          <p class="settings-subtitle">Task updates & payment alerts</p>
        </div>
        <span class="settings-toggle settings-toggle--on"></span>
      </button>
      <button class="settings-item" type="button">
        <div>
          <p class="settings-title">Payout methods</p>
          <p class="settings-subtitle">Manage bank accounts & wallets</p>
        </div>
        <span class="settings-chevron">›</span>
      </button>
      <button class="settings-item" type="button">
        <div>
          <p class="settings-title">Appearance</p>
          <p class="settings-subtitle">Dark mode is enabled</p>
        </div>
        <span class="settings-chevron">›</span>
      </button>
    </div>
  </article>

  <!-- Logout -->
  <button class="btn btn--outline btn--full btn--danger" type="button">
    Logout
  </button>
</section>
