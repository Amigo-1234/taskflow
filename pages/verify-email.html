<div class="auth-content auth-content--center">
  <section class="auth-hero">
    <div class="auth-illustration" aria-hidden="true">
      <div class="illu-blob illu-blob--purple"></div>
      <div class="illu-blob illu-blob--pink"></div>
      <div class="illu-blob illu-blob--cyan"></div>

      <div class="illu-card">
        <div class="illu-card__top">
          <div class="illu-avatar">
            <span>✉️</span>
          </div>
          <div>
            <p class="illu-title">Check your inbox</p>
            <p class="illu-subtitle">We’ve sent a verification link.</p>
          </div>
        </div>
        <div class="illu-footer">
          <span>Security first</span>
          <span class="status-badge status-badge--info">
            Email verification
          </span>
        </div>
      </div>
    </div>

    <div>
      <h1 class="auth-heading">Verify your email.</h1>
      <p class="auth-body">
        We’ve sent a secure link to your email. Open it on this device to finish
        setting up your TaskFlow account.
      </p>
    </div>
  </section>

  <section class="auth-actions">
    <button
      type="button"
      id="verify-resend"
      class="btn btn--ghost btn--full"
    >
      Resend email
    </button>
    <button
      type="button"
      class="btn btn--primary btn--full"
      data-auth-target="login"
    >
      Continue
    </button>
  </section>
</div>
