<div class="auth-content">
  <section class="auth-hero">
    <div>
      <h1 class="auth-heading">Reset your password.</h1>
      <p class="auth-body">
        Enter the email linked to your TaskFlow account and we’ll send you a
        secure reset link.
      </p>
    </div>
  </section>

  <section>
    <form id="forgot-form" class="auth-form" novalidate>
      <div class="field">
        <input
          id="forgot-email"
          class="field__input"
          type="email"
          name="email"
          autocomplete="email"
          placeholder=" "
          required
        />
        <label class="field__label" for="forgot-email">Email</label>
      </div>

      <button type="submit" class="btn btn--primary btn--full">
        <span>Send reset link</span>
      </button>

      <p class="auth-cta-inline">
        Remembered your password?
        <button
          type="button"
          class="auth-link"
          data-auth-target="login"
        >
          Back to login
        </button>
      </p>

      <p class="forgot-success">
        We’ve sent a secure reset link to your email. If it doesn’t arrive in a
        few minutes, check your spam folder.
      </p>
    </form>
  </section>
</div>
